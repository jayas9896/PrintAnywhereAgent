name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Map secrets into env so they can be referenced in step `if:` conditions.
    # GitHub does not expose the `secrets` context directly in `if:`.
    env:
      ES_USERNAME: ${{ secrets.ES_USERNAME }}
      ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
      ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
      ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build release and Windows installer
        run: npm run release:windows-installer

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Sign the setup.exe BEFORE SHA256SUMS is recomputed and before the
      # release is created, so the published checksum matches the signed bytes.
      # CodeSignTool (eSigner) is Java-based and runs on ubuntu-latest.
      # Skips gracefully when the ES_* secrets are not configured.
      - name: Sign setup.exe with SSL.com eSigner
        if: ${{ env.ES_USERNAME != '' }}
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/artifacts/printanywhere-agent-v${{ steps.version.outputs.version }}-setup.exe
          override: true
          malware_block: false

      # The build step wrote SHA256SUMS.txt against the UNSIGNED exe. Signing
      # in place changed the bytes, so recompute the checksum to match the
      # signed artifact. Format must match build-windows-installer.mjs:
      # "<digest>  <basename>" (two spaces, bare basename, no path).
      - name: Recompute SHA256SUMS.txt for signed setup.exe
        if: ${{ env.ES_USERNAME != '' }}
        shell: bash
        run: |
          cd artifacts
          sha256sum "printanywhere-agent-v${{ steps.version.outputs.version }}-setup.exe" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Signing summary
        shell: bash
        run: |
          if [ -n "${ES_USERNAME}" ]; then
            echo "::notice title=Code signing::setup.exe SIGNED with SSL.com eSigner; SHA256SUMS recomputed for signed bytes."
          else
            echo "::warning title=Code signing::ES_* secrets not set — setup.exe is UNSIGNED (release still published)."
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PrintAnywhere Agent ${{ steps.version.outputs.version }}
          files: |
            artifacts/printanywhere-agent-v${{ steps.version.outputs.version }}-setup.exe
            artifacts/SHA256SUMS.txt
          generate_release_notes: true

  windows-installer:
    needs: release
    runs-on: windows-latest
    # Map secrets into env so they can be referenced in step `if:` conditions.
    env:
      ES_USERNAME: ${{ secrets.ES_USERNAME }}
      ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
      ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
      ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build MSI
        run: npm run build:msi

      - name: Locate MSI artifact
        id: msi
        shell: bash
        run: |
          msi_path=$(ls PrintAnywhereAgent-*.msi | head -n1)
          echo "path=$msi_path" >> "$GITHUB_OUTPUT"

      # Sign the MSI in place BEFORE it is uploaded to the release.
      # Skips gracefully when the ES_* secrets are not configured.
      - name: Sign MSI with SSL.com eSigner
        if: ${{ env.ES_USERNAME != '' }}
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/${{ steps.msi.outputs.path }}
          override: true
          malware_block: false

      - name: Signing summary
        shell: bash
        run: |
          if [ -n "${ES_USERNAME}" ]; then
            echo "::notice title=Code signing::MSI SIGNED with SSL.com eSigner before upload."
          else
            echo "::warning title=Code signing::ES_* secrets not set — MSI is UNSIGNED (still uploaded)."
          fi

      - name: Upload MSI to the GitHub release
        run: gh release upload "${{ github.ref_name }}" "${{ steps.msi.outputs.path }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
