name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Map signing secrets into env so step `if:` conditions can reference them.
    # GitHub does not expose the `secrets` context directly in `if:`.
    env:
      ES_USERNAME: ${{ secrets.ES_USERNAME }}
      ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
      ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
      ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}

    steps:
      - uses: actions/checkout@v6

      # KAN-449 (trust): a tagged release is a TRUST release — it must be
      # signed. Fail fast if the SSL.com eSigner secrets are absent rather
      # than warn-and-publish an unsigned installer (the old behaviour).
      - name: Require code-signing secrets
        shell: bash
        run: |
          if [ -z "${ES_USERNAME}" ]; then
            echo "::error title=Unsigned release blocked::Code-signing secrets (ES_USERNAME/ES_PASSWORD/ES_CREDENTIAL_ID/ES_TOTP_SECRET) are not configured. A tagged trust release must be code-signed before publishing." >&2
            exit 1
          fi
          echo "Code-signing secrets present — release will be signed."

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Windows Node.js runtime
        uses: actions/cache@v5
        with:
          path: artifacts/cache
          key: node-win-runtime-v22.22.2

      - name: Install dependencies
        run: npm ci

      - name: Install MinGW cross-compiler
        run: sudo apt-get install -y mingw-w64

      - name: Build release and Windows installer
        run: npm run release:windows-installer

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Sign setup.exe BEFORE the checksum is recomputed and BEFORE the release
      # is created, so the published SHA256SUMS matches the signed bytes.
      # CodeSignTool (eSigner) is Java-based and runs on ubuntu-latest.
      # Skips gracefully when the ES_* secrets are not configured.
      - name: Sign setup.exe with SSL.com eSigner
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/artifacts/printanywhere-agent-v${{ steps.version.outputs.version }}-setup.exe
          override: true
          malware_block: false

      # The build step wrote SHA256SUMS.txt against the UNSIGNED setup.exe.
      # Signing in place changed the bytes, so refresh ONLY the setup.exe line
      # (other lines stay intact). Line format must match the build scripts:
      # "<digest>  <basename>" (two spaces, bare basename, no path).
      - name: Refresh SHA256SUMS.txt for signed setup.exe
        shell: bash
        run: |
          cd artifacts
          exe="printanywhere-agent-v${{ steps.version.outputs.version }}-setup.exe"
          # Drop any existing line for the setup.exe, keep the rest.
          if [ -f SHA256SUMS.txt ]; then
            grep -v "  ${exe}\$" SHA256SUMS.txt > SHA256SUMS.tmp || true
          else
            : > SHA256SUMS.tmp
          fi
          sha256sum "${exe}" >> SHA256SUMS.tmp
          mv SHA256SUMS.tmp SHA256SUMS.txt
          echo "Refreshed SHA256SUMS.txt:"
          cat SHA256SUMS.txt

      # KAN-449 (trust): assert — don't assume — that setup.exe is actually
      # Authenticode-signed AND RFC3161-timestamped. Timestamping preserves
      # trust after the cert expires; an un-timestamped signature is a latent
      # failure. Fails the release if verification does not pass.
      - name: Verify setup.exe is signed + timestamped
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq osslsigncode
          exe="artifacts/printanywhere-agent-v${{ steps.version.outputs.version }}-setup.exe"
          out=$(osslsigncode verify -in "$exe" 2>&1) || {
            echo "$out"; echo "::error title=Signature check failed::setup.exe failed osslsigncode verification (not signed or chain invalid)." >&2; exit 1; }
          echo "$out"
          echo "$out" | grep -qiE "Signature verification: ok" || {
            echo "::error title=Signature check failed::setup.exe signature did not verify OK." >&2; exit 1; }
          echo "$out" | grep -qiE "timestamp|signing time" || {
            echo "::error title=No timestamp::setup.exe is signed but NOT RFC3161-timestamped." >&2; exit 1; }
          echo "::notice title=Code signing::setup.exe verified SIGNED + TIMESTAMPED."

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "artifacts/printanywhere-agent-v${{ steps.version.outputs.version }}.zip" \
            "artifacts/printanywhere-agent-v${{ steps.version.outputs.version }}-setup.exe" \
            "artifacts/SHA256SUMS.txt" \
            --title "PrintAnywhere Agent ${{ github.ref_name }}" \
            --generate-notes

      # Phase 2c follow-up — hand the staged bundle to the
      # downstream windows-installer job so it can package the same
      # bytes into an MSI without rebuilding from scratch.
      - name: Upload staged bundle for MSI job
        uses: actions/upload-artifact@v7
        with:
          name: printanywhere-agent-bundle
          path: artifacts/printanywhere-agent-v${{ steps.version.outputs.version }}
          if-no-files-found: error
          retention-days: 1

  # Phase 2c — separate Windows job that builds the native EXE +
  # MSI from the same tag and uploads the MSI as an additional
  # release asset. Operators eventually pick the MSI over the
  # legacy zip + install-release.ps1 workflow.
  windows-installer:
    needs: release
    runs-on: windows-latest
    permissions:
      contents: write
    timeout-minutes: 25
    # Map signing secrets into env so step `if:` conditions can reference them.
    env:
      ES_USERNAME: ${{ secrets.ES_USERNAME }}
      ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
      ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
      ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}

    steps:
      - uses: actions/checkout@v6

      # KAN-449 (trust): the MSI + the inner native EXE must be signed.
      # Fail fast if signing secrets are absent instead of shipping unsigned.
      - name: Require code-signing secrets
        shell: pwsh
        run: |
          if (-not $env:ES_USERNAME) {
            Write-Host "::error title=Unsigned release blocked::Code-signing secrets (ES_*) are not configured. The MSI and inner EXE must be signed before publishing a tagged trust release."
            exit 1
          }
          Write-Host "Code-signing secrets present — MSI and inner EXE will be signed."

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download staged bundle from release job
        uses: actions/download-artifact@v8
        with:
          name: printanywhere-agent-bundle
          path: native-shell/PrintAnywhereAgent.Installer/payload

      - name: Run native-shell tests
        # KAN-425 — InstallLayoutTests regression fence. Fails the
        # release before the MSI is uploaded if the bundle-path
        # contract drifts again.
        shell: pwsh
        run: dotnet test native-shell/PrintAnywhereAgent.Tray.Tests/PrintAnywhereAgent.Tray.Tests.csproj -c Release

      - name: Build native tray EXE
        shell: pwsh
        run: node scripts/build-native-tray.mjs

      # KAN-449 (trust, point 6): sign the inner native tray EXE BEFORE it is
      # harvested into the MSI. Previously only the outer MSI/setup.exe were
      # signed, so the EXE the user actually runs shipped UNSIGNED inside a
      # signed MSI — SmartScreen/Defender can flag it at first launch.
      - name: Sign native tray EXE with SSL.com eSigner
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/artifacts/native-shell/PrintAnywhereAgent.exe
          override: true
          malware_block: false

      - name: Verify native tray EXE is signed + timestamped
        shell: pwsh
        run: |
          $path = "artifacts/native-shell/PrintAnywhereAgent.exe"
          $sig = Get-AuthenticodeSignature -FilePath $path
          if ($sig.Status -ne 'Valid') {
            Write-Host "::error title=Inner EXE signature invalid::Status=$($sig.Status) — $($sig.StatusMessage)"
            exit 1
          }
          if (-not $sig.SignerCertificate) {
            Write-Host "::error title=Inner EXE unsigned::No signer certificate on PrintAnywhereAgent.exe"; exit 1
          }
          if (-not $sig.TimeStamperCertificate) {
            Write-Host "::error title=Inner EXE not timestamped::No RFC3161 timestamp on PrintAnywhereAgent.exe"; exit 1
          }
          Write-Host "::notice title=Code signing::Inner EXE signed by '$($sig.SignerCertificate.Subject)', timestamped by '$($sig.TimeStamperCertificate.Subject)'."

      - name: Stage native EXE into MSI payload
        shell: pwsh
        run: |
          Copy-Item artifacts/native-shell/PrintAnywhereAgent.exe `
            native-shell/PrintAnywhereAgent.Installer/payload/ -Force

      - name: Harvest MSI payload into Harvested.wxs
        shell: pwsh
        run: |
          $payload = (Resolve-Path "native-shell/PrintAnywhereAgent.Installer/payload").Path
          $harvested = Join-Path (Resolve-Path "native-shell/PrintAnywhereAgent.Installer").Path "Harvested.wxs"
          node scripts/harvest-msi-payload.mjs --payload $payload --output $harvested

      - name: Build MSI
        shell: pwsh
        run: |
          $payload = (Resolve-Path "native-shell/PrintAnywhereAgent.Installer/payload").Path
          dotnet build native-shell/PrintAnywhereAgent.Installer/PrintAnywhereAgent.Installer.wixproj `
            -c Release `
            -p:PrintAnywhereAgentVersion=${{ steps.version.outputs.version }} `
            -p:PayloadSource=$payload

      - name: Locate MSI artifact
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem native-shell/PrintAnywhereAgent.Installer/bin/Release -Filter "PrintAnywhereAgent-${{ steps.version.outputs.version }}.msi" -Recurse | Select-Object -First 1
          if (-not $msi) { throw "MSI was not produced" }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "MSI: $($msi.FullName) ($([math]::Round($msi.Length / 1MB, 1)) MB)"

      # Sign the MSI in place BEFORE it is uploaded to the release.
      # Skips gracefully when the ES_* secrets are not configured.
      - name: Sign MSI with SSL.com eSigner
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ steps.msi.outputs.path }}
          override: true
          malware_block: false

      # KAN-449 (trust): assert the MSI is signed + timestamped before upload.
      - name: Verify MSI is signed + timestamped
        shell: pwsh
        run: |
          $path = "${{ steps.msi.outputs.path }}"
          $sig = Get-AuthenticodeSignature -FilePath $path
          if ($sig.Status -ne 'Valid') {
            Write-Host "::error title=MSI signature invalid::Status=$($sig.Status) — $($sig.StatusMessage)"
            exit 1
          }
          if (-not $sig.SignerCertificate) {
            Write-Host "::error title=MSI unsigned::No signer certificate on the MSI"; exit 1
          }
          if (-not $sig.TimeStamperCertificate) {
            Write-Host "::error title=MSI not timestamped::No RFC3161 timestamp on the MSI"; exit 1
          }
          Write-Host "::notice title=Code signing::MSI signed by '$($sig.SignerCertificate.Subject)', timestamped by '$($sig.TimeStamperCertificate.Subject)'."

      - name: Upload MSI to the GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.msi.outputs.path }}" --clobber
