name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Windows Node.js runtime
        uses: actions/cache@v4
        with:
          path: artifacts/cache
          key: node-win-runtime-v22.22.2

      - name: Install dependencies
        run: npm ci

      - name: Install MinGW cross-compiler
        run: sudo apt-get install -y mingw-w64

      - name: Build release and Windows installer
        run: npm run release:windows-installer

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "artifacts/printanywhere-agent-v${{ steps.version.outputs.version }}.zip" \
            "artifacts/printanywhere-agent-v${{ steps.version.outputs.version }}-setup.exe" \
            "artifacts/SHA256SUMS.txt" \
            --title "PrintAnywhere Agent ${{ github.ref_name }}" \
            --generate-notes
